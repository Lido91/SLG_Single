NAME: DETO_RVQ_Hierarchical_T2M  # Hierarchical RVQ-GPT with T2M-style Q0 decoder
ACCELERATOR: "gpu"
NUM_NODES: 1
DEVICE: [0,1]

TRAIN:
  STAGE: lm_pretrain  # Hierarchical RVQ-GPT stage (logs per-decoder losses & accuracies)
  NUM_WORKERS: 16
  BATCH_SIZE: 32  # Adjust based on GPU memory
  END_EPOCH: 150
  RESUME: ""
  PRETRAINED: ""
  PRETRAINED_VAE: "experiments/mgpt/DETO_RVQ_wholebody_3/checkpoints/min-how2sign_MPJPE_PA_handepoch=489.ckpt"  # Pretrained 6-quantizer RVQ-VAE

  OPTIM:
    target: AdamW
    params:
      lr: 1e-4  # Learning rate for hierarchical GPT
      betas: [0.9, 0.99]
      weight_decay: 0.01

  LR_SCHEDULER:
    target: CosineAnnealingLR
    params:
      T_max: ${TRAIN.END_EPOCH}
      eta_min: 1e-6

EVAL:
  BATCH_SIZE: 32
  SPLIT: val

TEST:
  CHECKPOINTS: ""  # Will be set after training
  SPLIT: test
  BATCH_SIZE: 16
  REPLICATION_TIMES: 1
  SAVE_PREDICTIONS: true
  MAX_SAMPLES: 500

DATASET:
  target: mGPT.data.H2S.H2SDataModule
  CODE_PATH: "TOKENS_h2s_rvq_whole_3"  # 6-quantizer tokens (we'll use first 3)
  TASK_PATH: prepare/instructions/template_pretrain.json  # Only T2M task for faster training

  WORD_VERTILIZER_PATH: prepare/deps/glove
  H2S:
    DATASET_NAME: how2sign
    ROOT: /data/hwu/slg_data/How2Sign
    CSL_ROOT: /data/hwu/slg_data/CSL-Daily
    PHOENIX_ROOT: /data/hwu/slg_data/Phoenix_2014T
    MEAN_PATH: /data/hwu/slg_data/CSL-Daily/mean.pt
    STD_PATH: /data/hwu/slg_data/CSL-Daily/std.pt
    MAX_MOTION_LEN: 400
    MIN_MOTION_LEN: 40
    MAX_TEXT_LEN: 40
    PICK_ONE_TEXT: true
    FRAME_RATE: 20.0
    UNIT_LEN: 4  # Temporal downsampling factor (400/4 = 100 tokens)
    STD_TEXT: False

METRIC:
  TYPE: ["TM2TMetrics"]  # Text-to-motion metrics for LM stage

LOSS:
  LAMBDA_CLS: 1.0  # Cross-entropy loss weight
  # Note: Hierarchical RVQ-GPT T2M uses 3 separate cross-entropy losses:
  # - Q0 loss (coarse) - T2M-style decoder
  # - Q1 loss (medium) - Cross-attention decoder
  # - Q2 loss (fine) - Cross-attention decoder
  # All weighted equally

# Model configuration for Hierarchical RVQ-GPT with T2M-style Q0
model:
  target: mGPT.models.mgpt.MotionGPT
  params:
    condition: "text"
    task: "t2m"
    lm: ${lm.rvq_hierarchical_t2m}    # T2M-style Hierarchical RVQ-GPT architecture
    motion_vae: ${vq.h2s_rvq_3}       # Use pretrained 6-quantizer RVQ-VAE
    hand_vae_cfg: null                # Not used - single VAE architecture
    rhand_vae_cfg: null               # Not used - single VAE architecture
    codebook_size: 512                # Must match RVQ-VAE codebook size

# LM reference - T2M-style Hierarchical RVQ-GPT
lm:
  rvq_hierarchical_t2m:
    target: mGPT.archs.mgpt_rvq_hierarchical.HierarchicalRVQGPT_T2M
    params:
      # Codebook Parameters
      num_vq: 512                     # Codebook size per quantizer (must match RVQ-VAE)

      # Architecture Parameters (matching original T2M-GPT)
      embed_dim: 1024                 # Token embedding dimension (T2M-GPT: 1024)
      block_size: 100                 # Maximum sequence length (400 frames / 4 = 100)
      num_layers: 9                   # Q0 Base layers (T2M-GPT: 9)
      num_layers_head: 9              # Q0 Head layers (T2M-GPT: 9) → Total Q0 = 18 blocks
      num_layers_q1q2: 3              # Number of layers for Q1/Q2 decoders
      n_head: 16                      # Number of attention heads (T2M-GPT: 16)
      dropout: 0.1                    # Dropout probability

      # Text Encoder Parameters
      text_dim: 512                   # Text feature dimension (512 for CLIP)
      clip_model: 'ViT-B/32'          # CLIP model for text encoding

      # Training Parameters
      pkeep: 0.5                      # Teacher forcing probability
                                      # 1.0 = full teacher forcing
                                      # 0.5 = scheduled sampling
                                      # 0.0 = no teacher forcing
      scheduled_sampling: 't2m'      # Scheduled sampling strategy:
                                      # 't2m' = T2M-GPT style (per-token + random replacement)
                                      # 'sample' = Per-sample + model predictions
                                      # 'none' = Always teacher forcing (ignores pkeep)

# VQ reference - Pretrained RVQ-VAE
vq:
  h2s_rvq_3:
    target: mGPT.archs.mgpt_rvq.RVQVae
    params:
      num_quantizers: 3               # First 3 quantizers used by LM
      quantizer: 'ema_reset'
      quantize_dropout_prob: 0.2
      quantize_dropout_cutoff_index: 0
      shared_codebook: false
      code_num: 512
      code_dim: 512
      output_emb_width: 512
      down_t: 2
      stride_t: 2
      width: 512
      depth: 3
      dilation_growth_rate: 3
      norm: None
      activation: 'relu'
      nfeats: 133                     # How2Sign full body features

LOGGER:
  TYPE: ["wandb"]
  VAL_EVERY_STEPS: 10
  WANDB:
    params:
      project: SLG
      name: ${NAME}
      tags: ['hierarchical', 'rvq', 't2m-style', 'text2motion', 'how2sign']
      notes: |
        Hierarchical RVQ-GPT with T2M-GPT style Q0 decoder
        - Q0 decoder: T2M-style (text PREPENDED to sequence, causal self-attention only)
          * Sinusoidal positional encoding (fixed)
          * No separate cross-attention layer
          * Proven approach from T2M-GPT paper
        - Q1 decoder: Cross-attention style (conditioned on Q0 + text)
        - Q2 decoder: Cross-attention style (conditioned on Q0 + Q1 + text)
        - EOS token (index 512) for learned length control
        - Output head: num_vq+1 (512 motion codes + 1 EOS)
