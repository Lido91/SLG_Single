NAME: LaMP_H2S_Speech_Youtube3D  # LaMP Pretraining with HuBERT-Large speech conditioning on Youtube3D
ACCELERATOR: "gpu"
NUM_NODES: 1
DEVICE: [0,1,2]

TRAIN:
  STAGE: lamp
  NUM_WORKERS: 16
  BATCH_SIZE: 16  # Smaller batch — speech encoder uses more memory
  END_EPOCH: 100
  RESUME: ""
  PRETRAINED:
  PRETRAINED_VAE: "experiments/mgpt/DETO_RVQ_wholebody_3_youtube/checkpoints/min-youtube3d_MPJPE_PA_handepoch=109.ckpt"

  OPTIM:
    target: AdamW
    params:
      lr: 1e-4
      betas: [0.9, 0.99]
      weight_decay: 0.01

  LR_SCHEDULER:
    target: CosineAnnealingLR
    params:
      T_max: ${TRAIN.END_EPOCH}
      eta_min: 1e-6

EVAL:
  BATCH_SIZE: 16
  SPLIT: val

TEST:
  CHECKPOINTS: "experiments/mgpt/LaMP_H2S_Speech_Youtube3D/checkpoints/last.ckpt"
  SPLIT: test
  BATCH_SIZE: 16
  REPLICATION_TIMES: 1
  SAVE_PREDICTIONS: false
  MAX_SAMPLES: 500

DATASET:
  target: mGPT.data.H2S.H2SDataModule
  CODE_PATH: "TOKENS_h2s_rvq_whole_3_Youtube3D"
  TASK_PATH: prepare/instructions/template_pretrain.json

  WORD_VERTILIZER_PATH: prepare/deps/glove
  USE_SPEECH: True
  AUDIO_DIR: /data/hwu/slg_data/Youtube3D
  PRELOAD_AUDIO: False
  H2S:
    DATASET_NAME: youtube3d
    ROOT: /data/hwu/slg_data/Youtube3D
    YOUTUBE3D_ROOT: /data/hwu/slg_data/Youtube3D
    CSL_ROOT: /data/hwu/slg_data/CSL-Daily
    PHOENIX_ROOT: /data/hwu/slg_data/Phoenix_2014T
    MEAN_PATH: /data/hwu/slg_data/Youtube3D/youtube3d_mean.pt
    STD_PATH: /data/hwu/slg_data/Youtube3D/youtube3d_std.pt
    MAX_MOTION_LEN: 400
    MIN_MOTION_LEN: 40
    MAX_TEXT_LEN: 40
    PICK_ONE_TEXT: true
    FRAME_RATE: 20.0
    UNIT_LEN: 4
    STD_TEXT: False

METRIC:
  TYPE: []

LOSS:
  LAMBDA_PTC: 1.0
  LAMBDA_PTM: 1.0
  LAMBDA_GEN: 1.0

# Model configuration — speech-conditioned LaMP
model:
  target: mGPT.models.mgpt.MotionGPT
  params:
    condition: "audio"
    task: "a2m"
    lm: ${lm.lamp_speech}
    motion_vae: ${vq.h2s_rvq_3}
    hand_vae_cfg: null
    rhand_vae_cfg: null
    codebook_size: 512
    metrics_dict: []

# LaMPSpeech reference
lm:
  lamp_speech:
    target: mGPT.archs.lamp.lamp_model_speech.LaMPSpeech
    params:
      nfeats: 133
      num_query_token: 49
      cross_attention_freq: 2
      embed_dim: 512
      motion_encoder_dim: 512
      num_tokens: 512
      speech_encoder_type: hubert-large

# VQ reference
vq:
  h2s_rvq_3:
    target: mGPT.archs.mgpt_rvq.RVQVae
    params:
      num_quantizers: 6
      quantizer: 'ema_reset'
      quantize_dropout_prob: 0.2
      quantize_dropout_cutoff_index: 0
      shared_codebook: false
      code_num: 512
      code_dim: 512
      output_emb_width: 512
      down_t: 2
      stride_t: 2
      width: 512
      depth: 3
      dilation_growth_rate: 3
      norm: None
      activation: 'relu'
      nfeats: 133

LOGGER:
  TYPE: ["wandb"]
  VAL_EVERY_STEPS: 10
  WANDB:
    params:
      project: SLG
      name: ${NAME}
      tags: ['lamp', 'speech', 'hubert-large', 'pretraining', 'youtube3d']
      notes: |
        LaMPSpeech on YouTube3D: Speech-conditioned LaMP with HuBERT-Large (1024D).
        - 3 training objectives: PTC, PTM, GEN
        - Frozen HuBERT-Large + frozen RVQ-VAE
        - QFormer with 49 query tokens
