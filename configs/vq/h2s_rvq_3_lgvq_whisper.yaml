target: mGPT.archs.mgpt_rvq_lgvq_speech.RVQVaeLGVQSpeech
params:
  # Residual Quantization Parameters
  num_quantizers: 3
  quantizer: 'ema_reset'
  quantize_dropout_prob: 0.2
  quantize_dropout_cutoff_index: 0
  shared_codebook: false

  # Codebook Parameters
  code_num: 512
  code_dim: 512
  output_emb_width: 512

  # Encoder/Decoder Architecture
  down_t: 2
  stride_t: 2
  width: 512
  depth: 3
  dilation_growth_rate: 3
  norm: None
  activation: 'relu'

  # Input Dimension
  nfeats: ${DATASET.NFEATS}

  # Ablation (from parent config)
  ablation: ${ABLATION}

  # Speech-Guided LG-VQ Parameters
  speech_encoder_type: 'whisper-medium'  # 1024D output, projected to code_dim
  freeze_speech_encoder: true
  use_precomputed_speech: false
  nce_weight: 0.001                     # InfoNCE contrastive loss weight
