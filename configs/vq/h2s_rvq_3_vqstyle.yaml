target: mGPT.archs.mgpt_rvq_vqstyle.RVQVaeVQStyle
params:
  # Residual Quantization Parameters (same as h2s_rvq_3)
  num_quantizers: 3               # Number of residual quantization stages
  quantizer: 'ema_reset'          # Base quantizer type
  quantize_dropout_prob: 0.2      # Quantizer dropout probability during training
  quantize_dropout_cutoff_index: 0
  shared_codebook: false

  # Codebook Parameters
  code_num: 512                   # Codebook size per quantizer
  code_dim: 512                   # Code dimension
  output_emb_width: 512           # Embedding width

  # Encoder/Decoder Architecture
  down_t: 2                       # Temporal downsampling layers
  stride_t: 2                     # Stride for downsampling (4x compression)
  width: 512                      # Channel width
  depth: 3                        # ResNet depth
  dilation_growth_rate: 3
  norm: None
  activation: 'relu'

  # Input Dimension
  nfeats: ${DATASET.NFEATS}

  # Ablation (from parent config)
  ablation: ${ABLATION}

  # VQ-Style Parameters
  content_cutoff: 1               # Q0 = content, Q1+ = style
  lambda_con: 0.005               # Contrastive loss weight (VQ-Style Table 4)
  lambda_mi: 0.02                 # MI loss weight (VQ-Style Table 4)
  tau_con: 0.07                   # Contrastive temperature
  tau_mi: 1.0                     # MI soft assignment temperature
  num_clusters: 64                # Text cluster count
  cluster_labels_path: 'cluster_labels.json'
