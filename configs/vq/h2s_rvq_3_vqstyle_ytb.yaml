target: mGPT.archs.mgpt_rvq_vqstyle.RVQVaeVQStyle
params:
  # Residual Quantization Parameters (same as h2s_rvq_3)
  num_quantizers: 3
  quantizer: 'ema_reset'
  quantize_dropout_prob: 0.2
  quantize_dropout_cutoff_index: 0
  shared_codebook: false

  # Codebook Parameters
  code_num: 512
  code_dim: 512
  output_emb_width: 512

  # Encoder/Decoder Architecture
  down_t: 2
  stride_t: 2
  width: 512
  depth: 3
  dilation_growth_rate: 3
  norm: None
  activation: 'relu'

  # Input Dimension
  nfeats: ${DATASET.NFEATS}

  # Ablation (from parent config)
  ablation: ${ABLATION}

  # VQ-Style Parameters
  content_cutoff: 1
  lambda_con: 0.005
  lambda_mi: 0.02
  tau_con: 0.07
  tau_mi: 1.0
  num_clusters: 128              # More clusters for larger combined dataset
  cluster_labels_path: 'cluster_labels_h2s_ytb.json'
