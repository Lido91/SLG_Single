# FSQ-based VQ-VAE Configuration
# Uses Finite Scalar Quantization instead of learned codebooks
#
# Advantages:
# - No codebook collapse
# - Simpler training (no EMA updates)
# - Deterministic quantization
# - Guaranteed full codebook utilization

target: mGPT.archs.mgpt_fsq.FSQVae
params:
  # FSQ-specific parameters
  fsq_levels: [5, 5, 5, 5]  # 5^4 = 625 discrete codes
  code_dim: 4                # Must match len(fsq_levels)

  # Encoder/Decoder parameters (same as standard VQ-VAE)
  output_emb_width: 512
  down_t: 2
  stride_t: 2
  width: 512
  depth: 3
  dilation_growth_rate: 3
  norm: null
  activation: 'relu'
  nfeats: ${DATASET.NFEATS}
  ablation: ${ABLATION}
