target: mGPT.archs.mgpt_hrvq.HRVQVae
params:
  # Hierarchical Residual Quantization Parameters (V2 with learnable Phi)
  scales: [1, 2, 4, 8]              # Multi-scale temporal factors
  quantizer_version: 'v2'           # V2 has learnable Phi refinement
  mu: 0.99                          # EMA decay rate for codebook

  # V2 Phi parameters
  share_quant_resi: 4               # Partially shared Phi (4 modules)
  quant_resi: 0.5                   # Residual ratio for Phi

  # Quantizer dropout (training regularization)
  start_drop: 1                     # Keep at least first scale
  quantize_dropout_prob: 0.2        # 20% chance of dropping higher scales

  # Codebook Parameters
  code_num: 512                     # Codebook size
  code_dim: 512                     # Code embedding dimension
  output_emb_width: 512             # Encoder output width

  # Encoder/Decoder Architecture
  down_t: 2                         # 4x temporal compression
  stride_t: 2
  width: 512
  depth: 3
  dilation_growth_rate: 3
  norm: null
  activation: 'relu'

  # Self-Attention enabled
  use_attn: true                    # Enable self-attention
  num_heads: 8                      # Number of attention heads

  # Input Dimension
  nfeats: ${DATASET.NFEATS}         # 133 for How2Sign

  # Ablation
  ablation: ${ABLATION}
