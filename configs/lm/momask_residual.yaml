# MoMask Residual Transformer (Stage 3) Architecture
# Refines motion by predicting residual tokens (Q1-Q2) conditioned on Q0
# IMPORTANT: Matches original MoMask hyperparameters
target: mGPT.archs.residual_transformer.ResidualTransformer
params:
  num_tokens: 512              # Codebook size (must match VAE)
  code_dim: 512                # Token embedding dimension
  latent_dim: 384              # Original default: 384
  ff_size: 1024                # Original default: 1024
  num_layers: 8                # Original default: 8 (n_layers)
  num_heads: 6                 # Original default: 6 (n_heads)
  dropout: 0.2                 # Original default: 0.2
  cond_drop_prob: 0.1          # Original default: 0.1 (same as Stage 2, controlled by flag)
  clip_dim: 512                # CLIP text embedding dimension
  clip_version: 'ViT-B/32'     # CLIP model version
  num_quantizers: 3            # Number of RVQ layers
  shared_codebook: false       # Use separate codebooks per quantizer (from vq_opt)
  share_weight: true           # Original: controlled by --share_weight flag
  cond_mode: 'text'            # Condition on text
