# MoMask Masked Transformer (Stage 2) Architecture
# Generates coarse motion tokens (Q0) from text using iterative unmasking
# IMPORTANT: Matches original MoMask hyperparameters
target: mGPT.archs.mask_transformer.MaskTransformer
params:
  num_tokens: 512              # Codebook size (must match VAE)
  code_dim: 512                # Token embedding dimension
  latent_dim: 384              # Original default: 384
  ff_size: 1024                # Original default: 1024
  num_layers: 8                # Original default: 8 (n_layers)
  num_heads: 6                 # Original default: 6 (n_heads)
  dropout: 0.2                 # Original default: 0.2 (NOT 0.1)
  cond_drop_prob: 0.1          # Original default: 0.1 for masked transformer
  clip_dim: 512                # CLIP text embedding dimension
  clip_version: 'ViT-B/32'     # CLIP model version
  num_quantizers: 3            # Number of RVQ layers (for compatibility)
  cond_mode: 'text'            # Condition on text
