NAME: DETO-H2S
ACCELERATOR: "gpu"
NUM_NODES: 1
DEVICE: [0]

TRAIN:
  STAGE: vae
  NUM_WORKERS: 8
  BATCH_SIZE: 64
  END_EPOCH: 100
  RESUME: ""
  PRETRAINED: ""
  PRETRAINED_VAE: 

  OPTIM:
    target: AdamW
    params:
      lr: 2e-4
      betas: [0.9, 0.99]
      weight_decay: 0.0

  LR_SCHEDULER:
    target: CosineAnnealingLR
    params:
      T_max: ${TRAIN.END_EPOCH}
      eta_min: 1e-6

EVAL:
  BATCH_SIZE: 
  SPLIT: val

TEST:
  CHECKPOINTS: 
  SPLIT: test
  BATCH_SIZE: 16
  REPLICATION_TIMES: 1
  SAVE_PREDICTIONS: False

DATASET:
  target: mGPT.data.H2S.H2SDataModule
  CODE_PATH: ""
  TASK_PATH: ""
  WORD_VERTILIZER_PATH: prepare/deps/glove
  H2S:
    DATASET_NAME: how2sign
    ROOT: /data/hwu/slg_data/How2Sign
    CSL_ROOT: /data/hwu/slg_data/CSL-Daily
    PHOENIX_ROOT: /data/hwu/slg_data/Phoenix_2014T
    MEAN_PATH: /data/hwu/slg_data/CSL-Daily/mean.pt
    STD_PATH: /data/hwu/slg_data/CSL-Daily/std.pt
    MAX_MOTION_LEN: 400
    MIN_MOTION_LEN: 40
    MAX_TEXT_LEN: 40
    PICK_ONE_TEXT: true
    FRAME_RATE: 20.0
    UNIT_LEN: 4
    STD_TEXT: False

METRIC:
  TYPE: ["MRMetrics"]

LOSS:
  LAMBDA_FEATURE: 1.0
  LAMBDA_VELOCITY: 0.0
  LAMBDA_COMMIT: 0.02
  LAMBDA_CLS: 1.0
  ABLATION:
    RECONS_LOSS: "l1_smooth"

model:
  target: mGPT.models.mgpt.MotionGPT
  params:
    condition: "text"
    task: "t2m"
    lm: ${lm.default}
    motion_vae: ${vq.default}
    hand_vae_cfg: null
    rhand_vae_cfg: null

LOGGER:
  TYPE: ["tensorboard"]
  VAL_EVERY_STEPS: 5
