NAME: DETO_RVQ_Hierarchical_6layer_h2s_drop # 6-Layer Hierarchical RVQ-GPT for How2Sign
ACCELERATOR: "gpu"
NUM_NODES: 1
DEVICE: [0,1,2]

TRAIN:
  STAGE: lm_pretrain  # Hierarchical RVQ-GPT stage (logs per-decoder losses & accuracies for Q0..Q5)
  NUM_WORKERS: 16
  BATCH_SIZE: 32  # Reduced vs 3-layer: 6 decoders use ~2x memory
  END_EPOCH: 150
  RESUME: ""
  PRETRAINED:
  PRETRAINED_VAE: experiments/mgpt/DETO_RVQ_wholebody/checkpoints/min-how2sign_MPJPE_PA_handepoch=439.ckpt  # 6-quantizer RVQ-VAE (from configs/deto_h2s_rvq.yaml)

  OPTIM:
    target: AdamW
    params:
      lr: 3e-4  # Learning rate for hierarchical GPT
      betas: [0.9, 0.99]
      weight_decay: 0.01

  LR_SCHEDULER:
    target: CosineAnnealingLR
    params:
      T_max: ${TRAIN.END_EPOCH}
      eta_min: 1e-6

EVAL:
  BATCH_SIZE: 8
  SPLIT: val

TEST:
  CHECKPOINTS: experiments/mgpt/DETO_RVQ_Hierarchical_6layer_h2s_drop/checkpoints/last.ckpt
  SPLIT: test
  BATCH_SIZE: 8
  REPLICATION_TIMES: 1
  SAVE_PREDICTIONS: true
  MAX_SAMPLES: 500

DATASET:
  target: mGPT.data.H2S.H2SDataModule
  CODE_PATH: "TOKENS_h2s_rvq_whole_6"  # 6-quantizer tokens (all 6 used)
  TASK_PATH: prepare/instructions/template_pretrain.json  # Only T2M task for faster training

  WORD_VERTILIZER_PATH: prepare/deps/glove
  H2S:
    DATASET_NAME: how2sign
    ROOT: /data/hwu/slg_data/How2Sign
    CSL_ROOT: /data/hwu/slg_data/CSL-Daily
    PHOENIX_ROOT: /data/hwu/slg_data/Phoenix_2014T
    MEAN_PATH: /data/hwu/slg_data/CSL-Daily/mean.pt
    STD_PATH: /data/hwu/slg_data/CSL-Daily/std.pt
    MAX_MOTION_LEN: 400
    MIN_MOTION_LEN: 40
    MAX_TEXT_LEN: 40
    PICK_ONE_TEXT: true
    FRAME_RATE: 20.0
    UNIT_LEN: 4  # Temporal downsampling factor (400/4 = 100 tokens)
    STD_TEXT: False
    GLOSS: ""
    BALANCED: False


METRIC:
  TYPE: ["TM2TMetrics"]  # Text-to-motion metrics for LM stage

LOSS:
  LAMBDA_CLS: 1.0  # Cross-entropy loss weight
  # Note: 6-Layer Hierarchical RVQ-GPT uses 6 separate cross-entropy losses
  # with geometric decay weights applied inside the model:
  # - Q0 loss (coarse)   weight=1.0
  # - Q1 loss            weight=0.5
  # - Q2 loss            weight=0.25
  # - Q3 loss            weight=0.125
  # - Q4 loss            weight=0.0625
  # - Q5 loss (finest)   weight=0.03125

# Model configuration for 6-Layer Hierarchical RVQ-GPT
model:
  target: mGPT.models.mgpt.MotionGPT
  params:
    condition: "text"
    text_encoder_type: clip
    task: "t2m"
    lm: ${lm.rvq_hierarchical_6layer}  # 6-Layer Hierarchical RVQ-GPT architecture
    motion_vae: ${vq.h2s_rvq_6}        # Pretrained 6-quantizer LGVQ RVQ-VAE
    hand_vae_cfg: null                 # Not used - single VAE architecture
    rhand_vae_cfg: null                # Not used - single VAE architecture
    codebook_size: 512                 # Must match RVQ-VAE codebook size

# LM reference
lm:
  rvq_hierarchical_6layer:
    target: mGPT.archs.mgpt_rvq_hierarchical.HierarchicalRVQGPT_6_layer
    params:
      num_vq: 512                   # Must match VAE codebook size (Q0..Q5 share vocab)
      embed_dim: 1024
      block_size: 100
      # Per-decoder layer counts (Q0 deeper since it carries most of the semantic load)
      num_layers: 6                 # Default for any Q without an explicit num_layers_qN
      num_layers_q0: 9              # Coarse - deepest
      num_layers_q1: 6
      num_layers_q2: 6
      num_layers_q3: 6
      num_layers_q4: 6
      num_layers_q5: 6              # Finest
      n_head: 16
      dropout: 0.1
      text_dim: 512                 # CLIP text dimension
      text_encoder_type: clip       # 'clip' (512), 'bert' (768), 'bert-large' (1024)
      pkeep: 0.5                    # 1.0=full teacher forcing, 0.5=scheduled sampling
      conditioning_mode: 'full'     # 'chain' (Q_i on Q_{i-1} only) or 'full' (Q_i on Q_0..Q_{i-1})
      corrupt_ratio: 0.0            # Per-time RVQ corruption fraction (T2M-HiFiGPT Sec 3.4); 0.0 disables
      # q0_decoder_type: transformer  # 'transformer' (cross-attention) or 'llamagen' (RMSNorm/GQA+RoPE/SwiGLU, prefix-concat)
      # LlamaGen-specific (only used when q0_decoder_type=llamagen):
      # n_kv_head: null             # GQA KV heads (null = n_head = standard MHA)
      # drop_path_rate: 0.0         # Stochastic depth for LlamaGen Q0

      # NOTE: HierarchicalRVQGPT_6_layer does NOT currently support speech
      # conditioning. Q1..Q5 always use the transformer cross-attention decoder.

# VQ reference
vq:
  h2s_rvq_6:
    target: mGPT.archs.mgpt_rvq.RVQVae
    params:
      num_quantizers: 6             # Full 6-quantizer VAE (all 6 used by 6-layer LM)
      quantizer: 'ema_reset'
      quantize_dropout_prob: 0.2
      quantize_dropout_cutoff_index: 0
      shared_codebook: false
      code_num: 512
      code_dim: 512
      output_emb_width: 512
      down_t: 2
      stride_t: 2
      width: 512
      depth: 3
      dilation_growth_rate: 3
      norm: None
      activation: 'relu'
      nfeats: 133                   # How2Sign full body features

LOGGER:
  TYPE: ["wandb"]
  VAL_EVERY_STEPS: 10
  WANDB:
    params:
      project: SLG
      name: ${NAME}
      tags: ['hierarchical', 'rvq', 'text2motion', 'how2sign', '6layer']
      notes: |
        6-Layer Hierarchical RVQ-GPT: uses all 6 quantizers Q0..Q5
        - Q0 decoder: Coarse codes (text-only conditioning)
        - Q1..Q5 decoders: progressive refinement
        - conditioning_mode='full': each Q_i cross-attends to Q_0..Q_{i-1} embeddings
        - EOS token (index 512) for learned length control
        - pkeep=0.5 scheduled sampling to reduce exposure bias
        - Loss weights: Q0=1.0, Q1=0.5, Q2=0.25, Q3=0.125, Q4=0.0625, Q5=0.03125
