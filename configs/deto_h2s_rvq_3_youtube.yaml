NAME: DETO_RVQ_wholebody_3_youtube # Decoupled Tokenizer for How2Sign with Residual VQ
ACCELERATOR: "gpu"
NUM_NODES: 1
DEVICE: [0]

TRAIN:
  STAGE: vae  # VAE training stage
  NUM_WORKERS: 16
  BATCH_SIZE: 32 # Adjust based on GPU memory
  END_EPOCH: 500
  RESUME: ""
  PRETRAINED: 
  PRETRAINED_VAE:   "experiments/mgpt/DETO_RVQ_wholebody_3_youtube/checkpoints/min-youtube3d_MPJPE_PA_handepoch=109.ckpt"
  OPTIM:
    target: AdamW
    params:
      lr: 2e-4
      betas: [0.9, 0.99]
      weight_decay: 0.0

  LR_SCHEDULER:
    target: CosineAnnealingLR
    params:
      T_max: ${TRAIN.END_EPOCH}
      eta_min: 1e-6

EVAL:
  BATCH_SIZE: 32
  SPLIT: val

TEST:
  CHECKPOINTS:   "experiments/mgpt/DETO_RVQ_wholebody_3_youtube/checkpoints/min-youtube3d_MPJPE_PA_handepoch=109.ckpt"
  SPLIT: test
  BATCH_SIZE: 16
  REPLICATION_TIMES: 1
  SAVE_PREDICTIONS: true

DATASET:
  target: mGPT.data.H2S.H2SDataModule
  CODE_PATH: "TOKENS_h2s_rvq_whole_3_Youtube3D"  # Not used in VAE stage
  TASK_PATH: ""
  WORD_VERTILIZER_PATH: prepare/deps/glove
  H2S:
    DATASET_NAME: youtube3d
    ROOT: /data/hwu/slg_data/Youtube3D
    YOUTUBE3D_ROOT: /data/hwu/slg_data/Youtube3D
    CSL_ROOT: /data/hwu/slg_data/CSL-Daily
    PHOENIX_ROOT: /data/hwu/slg_data/Phoenix_2014T
    MEAN_PATH: /data/hwu/slg_data/Youtube3D/youtube3d_mean.pt
    STD_PATH: /data/hwu/slg_data/Youtube3D/youtube3d_std.pt
    MAX_MOTION_LEN: 400
    MIN_MOTION_LEN: 40
    MAX_TEXT_LEN: 40
    PICK_ONE_TEXT: true
    FRAME_RATE: 20.0
    UNIT_LEN: 4
    STD_TEXT: False

METRIC:
  TYPE: ["MRMetrics"]  # Motion Reconstruction metrics for VAE stage

LOSS:
  LAMBDA_FEATURE: 1.0
  LAMBDA_VELOCITY: 0.0
  LAMBDA_COMMIT: 0.02  # Commitment loss weight (averaged across all quantizer stages)
  LAMBDA_CLS: 1.0
  ABLATION:
    RECONS_LOSS: "l1_smooth"

# Model configuration for R-VQVAE
# KEY DIFFERENCE from SOKE's deto_rvq.yaml:
# - SOKE has 3-part architecture: motion_vae (body:43), hand_vae_cfg (lhand:45), rhand_vae_cfg (rhand:45)
# - MotionGPT H2S has 1-part architecture: motion_vae (full body:133)
# - hand_vae_cfg and rhand_vae_cfg are set to null
model:
  target: mGPT.models.mgpt.MotionGPT
  params:
    condition: "text"
    task: "t2m"
    lm: ${lm.default}
    motion_vae: ${vq.h2s_rvq_3}      # Use R-VQVAE for full body (133 features)
    hand_vae_cfg: null              # Not used - single VAE architecture
    rhand_vae_cfg: null             # Not used - single VAE architecture

LOGGER:
  TYPE: ["wandb"]  # or ["wandb"] for Weights & Biases
  VAL_EVERY_STEPS: 10
  Uncomment for W&B logging:
  WANDB:
    params:
      project: SLG
      name: ${NAME}
      tags: ['rvqvae', 'residual_quantization', 'how2sign']
