NAME: DETO_RVQ_Hierarchical_CFB_3layer_how2sign_text  # CFB pre-fusion variant, text + How2Sign
ACCELERATOR: "gpu"
NUM_NODES: 1
DEVICE: [0,1]

TRAIN:
  STAGE: lm_pretrain
  NUM_WORKERS: 16
  BATCH_SIZE: 32
  END_EPOCH: 150
  RESUME: ""
  PRETRAINED:
  PRETRAINED_VAE: experiments/mgpt/DETO_RVQ_wholebody_3_2026-02-01-17-21-28/checkpoints/min-how2sign_MPJPE_PA_handepoch=489.ckpt

  OPTIM:
    target: AdamW
    params:
      lr: 3e-4
      betas: [0.9, 0.99]
      weight_decay: 0.01

  LR_SCHEDULER:
    target: CosineAnnealingLR
    params:
      T_max: ${TRAIN.END_EPOCH}
      eta_min: 1e-6

EVAL:
  BATCH_SIZE: 16
  SPLIT: val

TEST:
  CHECKPOINTS: experiments/mgpt/DETO_RVQ_Hierarchical_CFB_3layer_how2sign_text/checkpoints/min-how2sign_DTW_MPJPE_PA_lhandepoch=139.ckpt
  SPLIT: test
  BATCH_SIZE: 16
  REPLICATION_TIMES: 1
  SAVE_PREDICTIONS: true
  MAX_SAMPLES: 500

DATASET:
  target: mGPT.data.H2S.H2SDataModule
  CODE_PATH: "TOKENS_h2s_rvq_whole_3"
  TASK_PATH: prepare/instructions/template_pretrain.json

  WORD_VERTILIZER_PATH: prepare/deps/glove
  H2S:
    DATASET_NAME: how2sign
    ROOT: /data/hwu/slg_data/How2Sign
    CSL_ROOT: /data/hwu/slg_data/CSL-Daily
    PHOENIX_ROOT: /data/hwu/slg_data/Phoenix_2014T
    MEAN_PATH: /data/hwu/slg_data/CSL-Daily/mean.pt
    STD_PATH: /data/hwu/slg_data/CSL-Daily/std.pt
    MAX_MOTION_LEN: 400
    MIN_MOTION_LEN: 40
    MAX_TEXT_LEN: 40
    PICK_ONE_TEXT: true
    FRAME_RATE: 20.0
    UNIT_LEN: 4
    STD_TEXT: False
    GLOSS: ""
    BALANCED: False

METRIC:
  TYPE: ["TM2TMetrics"]

LOSS:
  LAMBDA_CLS: 1.0

model:
  target: mGPT.models.mgpt.MotionGPT
  params:
    condition: "text"
    text_encoder_type: clip
    task: "t2m"
    lm: ${lm.rvq_hierarchical_cfb_text}
    motion_vae: ${vq.h2s_rvq_3}
    hand_vae_cfg: null
    rhand_vae_cfg: null
    codebook_size: 512

lm:
  rvq_hierarchical_cfb_text:
    target: mGPT.archs.mgpt_rvq_hierarchical_cfb.HierarchicalRVQGPTCFB
    params:
      num_vq: 2048
      embed_dim: 1024
      block_size: 100
      num_layers: 9
      num_layers_q0: 9
      num_layers_q1: 6
      num_layers_q2: 6
      num_cfb_layers_q1: 3
      num_cfb_layers_q2: 3
      cfb_use_gate: True
      n_head: 16
      dropout: 0.1
      q0_decoder_type: transformer
      q1_use_cond: True
      q2_use_cond: True
      pkeep: 0.5
      corrupt_ratio: 0.0
      text_encoder_type: CLIP         # CLIP(512) / bert(768) / bert-large(1024)
      speech_encoder_type: null
      use_speech: False
      contrastive_speech_ckpt: null   # N/A in text mode

vq:
  h2s_rvq_3:
    target: mGPT.archs.mgpt_rvq.RVQVae
    params:
      num_quantizers: 3
      quantizer: 'ema_reset'
      quantize_dropout_prob: 0.2
      quantize_dropout_cutoff_index: 0
      shared_codebook: false
      code_num: 512
      code_dim: 512
      output_emb_width: 512
      down_t: 2
      stride_t: 2
      width: 512
      depth: 3
      dilation_growth_rate: 3
      norm: None
      activation: 'relu'
      nfeats: 133

LOGGER:
  TYPE: ["wandb"]
  VAL_EVERY_STEPS: 10
  WANDB:
    params:
      project: SLG
      name: ${NAME}
      tags: ['hierarchical', 'rvq', 'cfb', 'text2motion', 'how2sign', 'bert']
      notes: |
        Text-Driven Hierarchical RVQ-GPT + CFB on How2Sign
        - BERT-base token-level encoder (768D, frozen)
        - CFB_Q1 / CFB_Q2 pre-fusion (3 layers each), gated FFN
        - Q1/Q2 decoders use Q0-style shape, cross-attn K/V = fused context
