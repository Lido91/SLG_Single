NAME: LaMP_H2S_Youtube3D  # LaMP Pretraining for Youtube3D
ACCELERATOR: "gpu"
NUM_NODES: 1
DEVICE: [0,1,2]

TRAIN:
  STAGE: lamp  # LaMP contrastive pretraining stage
  NUM_WORKERS: 16
  BATCH_SIZE: 32
  END_EPOCH: 100
  RESUME: ""
  PRETRAINED:
  PRETRAINED_VAE: "experiments/mgpt/DETO_RVQ_wholebody_3_youtube/checkpoints/min-youtube3d_MPJPE_PA_handepoch=109.ckpt"

  OPTIM:
    target: AdamW
    params:
      lr: 1e-4
      betas: [0.9, 0.99]
      weight_decay: 0.01

  LR_SCHEDULER:
    target: CosineAnnealingLR
    params:
      T_max: ${TRAIN.END_EPOCH}
      eta_min: 1e-6

EVAL:
  BATCH_SIZE: 32
  SPLIT: val

TEST:
  CHECKPOINTS: "experiments/mgpt/LaMP_H2S_Youtube3D/checkpoints/last.ckpt"
  SPLIT: test
  BATCH_SIZE: 32
  REPLICATION_TIMES: 1
  SAVE_PREDICTIONS: false
  MAX_SAMPLES: 500

DATASET:
  target: mGPT.data.H2S.H2SDataModule
  CODE_PATH: "TOKENS_h2s_rvq_whole_3_Youtube3D"
  TASK_PATH: prepare/instructions/template_pretrain.json

  WORD_VERTILIZER_PATH: prepare/deps/glove
  H2S:
    DATASET_NAME: youtube3d
    ROOT: /data/hwu/slg_data/Youtube3D
    YOUTUBE3D_ROOT: /data/hwu/slg_data/Youtube3D
    CSL_ROOT: /data/hwu/slg_data/CSL-Daily
    PHOENIX_ROOT: /data/hwu/slg_data/Phoenix_2014T
    MEAN_PATH: /data/hwu/slg_data/Youtube3D/youtube3d_mean.pt
    STD_PATH: /data/hwu/slg_data/Youtube3D/youtube3d_std.pt
    MAX_MOTION_LEN: 400
    MIN_MOTION_LEN: 40
    MAX_TEXT_LEN: 40
    PICK_ONE_TEXT: true
    FRAME_RATE: 20.0
    UNIT_LEN: 4
    STD_TEXT: False

METRIC:
  TYPE: []  # No metrics during LaMP pretraining (contrastive learning only)

LOSS:
  LAMBDA_PTC: 1.0   # Point-Text Contrastive
  LAMBDA_PTM: 1.0   # Point-Text Matching
  LAMBDA_GEN: 1.0   # Generation (T2M)

# Model configuration for LaMP
model:
  target: mGPT.models.mgpt.MotionGPT
  params:
    condition: "text"
    task: "t2m"
    lm: ${lm.lamp}               # LaMP architecture
    motion_vae: ${vq.h2s_rvq_3}  # Pretrained RVQ-VAE (frozen)
    hand_vae_cfg: null
    rhand_vae_cfg: null
    codebook_size: 512
    metrics_dict: []  # No metrics for LaMP stage

# LaMP reference
lm:
  lamp:
    target: mGPT.archs.lamp.lamp_model.LaMP
    params:
      nfeats: 133
      num_query_token: 49
      cross_attention_freq: 2
      embed_dim: 512
      max_txt_len: 40            # Matches YouTube3D MAX_TEXT_LEN
      motion_encoder_dim: 512
      num_tokens: 512

# VQ reference
vq:
  h2s_rvq_3:
    target: mGPT.archs.mgpt_rvq.RVQVae
    params:
      num_quantizers: 6
      quantizer: 'ema_reset'
      quantize_dropout_prob: 0.2
      quantize_dropout_cutoff_index: 0
      shared_codebook: false
      code_num: 512
      code_dim: 512
      output_emb_width: 512
      down_t: 2
      stride_t: 2
      width: 512
      depth: 3
      dilation_growth_rate: 3
      norm: None
      activation: 'relu'
      nfeats: 133

LOGGER:
  TYPE: ["wandb"]
  VAL_EVERY_STEPS: 10
  WANDB:
    params:
      project: SLG
      name: ${NAME}
      tags: ['lamp', 'contrastive', 'pretraining', 'youtube3d']
      notes: |
        LaMP (Language-Motion Pretraining) for YouTube3D sign language.
        - 3 training objectives: PTC, PTM, GEN
        - Uses frozen RVQ-VAE encoder for motion features (online encoding)
        - QFormer with 49 query tokens
