NAME: MoMask_H2S_Inference  # Full inference pipeline
ACCELERATOR: "gpu"
NUM_NODES: 1
DEVICE: [0]

TRAIN:
  STAGE: inference  # Inference mode: all models frozen
  NUM_WORKERS: 8
  BATCH_SIZE: 16
  END_EPOCH: 1
  RESUME: ""
  PRETRAINED: ""
  PRETRAINED_VAE: ""

  OPTIM:
    target: AdamW
    params:
      lr: 1e-4
      betas: [0.9, 0.99]
      weight_decay: 0.0

  LR_SCHEDULER:
    target: CosineAnnealingLR
    params:
      T_max: ${TRAIN.END_EPOCH}
      eta_min: 1e-6

EVAL:
  BATCH_SIZE: 16
  SPLIT: val

TEST:
  CHECKPOINTS: experiments/mgpt/MoMask_H2S_Inference/checkpoints/best.ckpt
  SPLIT: test
  BATCH_SIZE: 16
  REPLICATION_TIMES: 1
  SAVE_PREDICTIONS: true

DATASET:
  target: mGPT.data.H2S.H2SDataModule
  CODE_PATH: ""
  TASK_PATH: prepare/instructions/template_pretrain.json
  WORD_VERTILIZER_PATH: prepare/deps/glove
  H2S:
    DATASET_NAME: how2sign
    ROOT: /data/hwu/slg_data/How2Sign
    CSL_ROOT: /data/hwu/slg_data/CSL-Daily
    PHOENIX_ROOT: /data/hwu/slg_data/Phoenix_2014T
    MEAN_PATH: /data/hwu/slg_data/CSL-Daily/mean.pt
    STD_PATH: /data/hwu/slg_data/CSL-Daily/std.pt
    MAX_MOTION_LEN: 400
    MIN_MOTION_LEN: 40
    MAX_TEXT_LEN: 40
    PICK_ONE_TEXT: true
    FRAME_RATE: 20.0
    UNIT_LEN: 4
    STD_TEXT: False
    GLOSS: t5
    BALANCED: False

METRIC:
  TYPE: ['TM2TMetrics']  # Full text-to-motion evaluation
  MM_NUM_REPEATS: 30

LOSS:
  LAMBDA_FEATURE: 1.0
  LAMBDA_VELOCITY: 0.0
  LAMBDA_COMMIT: 0.02
  LAMBDA_CLS: 1.0
  ABLATION:
    RECONS_LOSS: "l1_smooth"

# MoMask Inference: Load all three components
# Generation pipeline: Text -> MaskTransformer (Q0) -> ResTransformer (Q1-Q2) -> VAE decode -> Motion
model:
  target: mGPT.models.mgpt_momask.MoMask
  params:
    condition: "text"
    task: "t2m"
    stage: "inference"  # All models frozen
    codebook_size: 512
    num_quantizers: 3
    motion_vae: ${vq.h2s_rvq_3}            # Load trained VAE
    mask_transformer: ${lm.momask_transformer}  # Load trained Masked Transformer
    res_transformer: ${lm.momask_residual}      # Load trained Residual Transformer
    metrics_dict: ['TM2TMetrics']

# Generation hyperparameters (can be tuned)
GENERATION:
  timesteps: 10                # Number of iterative unmasking steps for Stage 2
  cond_scale_mask: 4.0         # CFG scale for Masked Transformer
  cond_scale_res: 2.0          # CFG scale for Residual Transformer
  temperature: 1.0             # Sampling temperature
  topk_filter_thres: 0.9       # Top-k filtering threshold

LOGGER:
  TYPE: ["wandb"]
  VAL_EVERY_STEPS: 10
  WANDB:
    params:
      project: SLG
      name: ${NAME}
      tags: ['momask', 'inference', 'how2sign']
