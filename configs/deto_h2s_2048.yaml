NAME: DETO-H2S_2048
ACCELERATOR: "gpu"
NUM_NODES: 1
DEVICE: [0,1,2]

TRAIN:
  STAGE: vae
  SPLIT: train
  NUM_WORKERS: 8
  BATCH_SIZE: 32
  END_EPOCH: 500
  RESUME: ""
  PRETRAINED: ""
  PRETRAINED_VAE: experiments/mgpt/DETO-H2S_2048/checkpoints/min-how2sign_MPJPE_PA_handepoch=59.ckpt

  OPTIM:
    target: AdamW
    params:
      lr: 2e-4
      betas: [0.9, 0.99]
      weight_decay: 0.0

  LR_SCHEDULER:
    target: CosineAnnealingLR
    params:
      T_max: ${TRAIN.END_EPOCH}
      eta_min: 1e-6

EVAL:
  BATCH_SIZE: 32
  NUM_WORKERS: 8
  SPLIT: val

TEST:
  CHECKPOINTS: experiments/mgpt/DETO-H2S_2048/checkpoints/min-how2sign_MPJPE_PA_handepoch=59.ckpt
  SPLIT: test
  BATCH_SIZE: 16
  NUM_WORKERS: 8
  REPLICATION_TIMES: 1
  SAVE_PREDICTIONS: True

DATASET:
  target: mGPT.data.H2S.H2SDataModule
  CODE_PATH: "TOKENS_h2s_2048"
  TASK_PATH: ""
  WORD_VERTILIZER_PATH: prepare/deps/glove
  H2S:
    DATASET_NAME: how2sign
    ROOT: /data/hwu/slg_data/How2Sign
    CSL_ROOT: /data/hwu/slg_data/CSL-Daily
    PHOENIX_ROOT: /data/hwu/slg_data/Phoenix_2014T
    MEAN_PATH: /data/hwu/slg_data/CSL-Daily/mean.pt
    STD_PATH: /data/hwu/slg_data/CSL-Daily/std.pt
    MAX_MOTION_LEN: 400
    MIN_MOTION_LEN: 40
    MAX_TEXT_LEN: 40
    PICK_ONE_TEXT: true
    FRAME_RATE: 20.0
    UNIT_LEN: 4
    STD_TEXT: False
    GLOSS: qwen
    BALANCED: False

METRIC:
  TYPE: ["MRMetrics"]

LOSS:
  LAMBDA_FEATURE: 1.0
  LAMBDA_VELOCITY: 0.0
  LAMBDA_COMMIT: 0.02
  LAMBDA_CLS: 1.0
  ABLATION:
    RECONS_LOSS: "l1_smooth"

model:
  target: mGPT.models.mgpt.MotionGPT
  params:
    condition: "text"
    task: "t2m"
    lm: ${lm.default}
    motion_vae: ${vq.default_2048}
    hand_vae_cfg: null
    rhand_vae_cfg: null

LOGGER:
  TYPE: ["wandb"]
  VAL_EVERY_STEPS: 10
  WANDB:
    params:
      project: SLG
      name: ${NAME}
      tags: ['vqvae', 'text2motion', 'how2sign']
      notes: |
        Hierarchical RVQ-GPT: Uses first 3 of 6 quantizers (Q0→Q1→Q2)
        - Q0 decoder: Coarse codes (text-only conditioning)
        - Q1 decoder: Medium refinement (conditioned on Q0 + text)
        - Q2 decoder: Fine refinement (conditioned on Q0 + Q1 + text)
        - EOS token (index 512) for learned length control
        - pkeep=0.5 scheduled sampling to reduce exposure bias
        - Output head: num_vq+1 (512 motion codes + 1 EOS)