NAME: MoMask_H2S_Stage2  # MoMask Stage 2: Masked Transformer for How2Sign
DEBUG: False
ACCELERATOR: 'gpu'
NUM_NODES: 1
DEVICE: [0]

TRAIN:
  STAGE: mask_transformer  # Train Masked Transformer
  NUM_WORKERS: 8
  BATCH_SIZE: 64
  END_EPOCH: 500
  RESUME: ''
  PRETRAINED: ''
  # Path to pretrained RVQ-VAE checkpoint (Stage 1)
  PRETRAINED_VAE: experiments/mgpt/DETO_RVQ_wholebody/checkpoints/best.ckpt

  OPTIM:
    target: AdamW
    params:
      lr: 2e-4
      betas: [0.9, 0.99]
      weight_decay: 1e-5

  LR_SCHEDULER:
    target: CosineAnnealingLR
    params:
      T_max: ${TRAIN.END_EPOCH}
      eta_min: 1e-6

EVAL:
  BATCH_SIZE: 32
  SPLIT: val

TEST:
  CHECKPOINTS: ''
  SPLIT: test
  BATCH_SIZE: 32
  REPLICATION_TIMES: 1
  SAVE_PREDICTIONS: false

DATASET:
  target: mGPT.data.H2S.H2SDataModule
  CODE_PATH: ''
  TASK_PATH: ''
  H2S:
    DATASET_NAME: how2sign
    ROOT: ../SOKE/data/How2Sign
    CSL_ROOT: ../SOKE/data/CSL-Daily
    PHOENIX_ROOT: ../SOKE/data/Phoenix_2014T
    MEAN_PATH: ../SOKE/data/CSL-Daily/mean.pt
    STD_PATH: ../SOKE/data/CSL-Daily/std.pt
    MAX_MOTION_LEN: 400
    MIN_MOTION_LEN: 40
    MAX_TEXT_LEN: 40
    PICK_ONE_TEXT: true
    FRAME_RATE: 20.0
    UNIT_LEN: 4
    STD_TEXT: False

METRIC:
  TYPE: ['MRMetrics']

LOSS:
  LAMBDA_FEATURE: 1.0
  LAMBDA_VELOCITY: 0.0
  LAMBDA_COMMIT: 0.02
  LAMBDA_CLS: 1.0
  ABLATION:
    RECONS_LOSS: 'l1_smooth'

# MoMask model configuration
model:
  target: mGPT.models.mgpt_momask.MoMask
  params:
    condition: 'text'
    task: 't2m'
    stage: ${TRAIN.STAGE}
    codebook_size: 512
    num_quantizers: 6
    motion_vae: ${vq.h2s_rvq}
    mask_transformer: ${mask_transformer.default}
    res_transformer: null  # Not used in Stage 2

# MaskTransformer configuration
mask_transformer:
  default:
    target: mGPT.archs.mask_transformer.MaskTransformer
    params:
      num_tokens: 512
      code_dim: 512
      latent_dim: 384
      ff_size: 1024
      num_layers: 8
      num_heads: 6
      dropout: 0.1
      cond_drop_prob: 0.1
      clip_dim: 512
      clip_version: 'ViT-B/32'
      num_quantizers: 6
      cond_mode: 'text'

LOGGER:
  TYPE: ['wandb']
  VAL_EVERY_STEPS: 5
  WANDB:
    params:
      project: SLG
      name: ${NAME}
      tags: ['momask', 'mask_transformer', 'stage2', 'how2sign']
