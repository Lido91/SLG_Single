NAME: DETO_RVQ_wholebody_3_lgvq_whisper  # RVQ-VAE with Speech-Guided (Whisper) Codebook Learning
ACCELERATOR: "gpu"
NUM_NODES: 1
DEVICE: [0,1]

TRAIN:
  STAGE: vae
  NUM_WORKERS: 8
  BATCH_SIZE: 32  # Reduced from 32 due to whisper memory overhead
  END_EPOCH: 500
  RESUME: ""
  PRETRAINED:
  PRETRAINED_VAE: ""

  OPTIM:
    target: AdamW
    params:
      lr: 2e-4
      betas: [0.9, 0.99]
      weight_decay: 0.1

  LR_SCHEDULER:
    target: CosineAnnealingLR
    params:
      T_max: ${TRAIN.END_EPOCH}
      eta_min: 1e-6

EVAL:
  BATCH_SIZE: 24
  SPLIT: val

TEST:
  CHECKPOINTS: experiments/mgpt/${NAME}/checkpoints/last.ckpt
  SPLIT: test
  BATCH_SIZE: 16
  REPLICATION_TIMES: 1
  SAVE_PREDICTIONS: true

DATASET:
  target: mGPT.data.H2S.H2SDataModule
  CODE_PATH: "TOKENS_h2s_rvq_whole_3"
  TASK_PATH: ""
  WORD_VERTILIZER_PATH: prepare/deps/glove
  H2S:
    DATASET_NAME: how2sign
    ROOT: /data/hwu/slg_data/How2Sign
    CSL_ROOT: /data/hwu/slg_data/CSL-Daily
    PHOENIX_ROOT: /data/hwu/slg_data/Phoenix_2014T
    MEAN_PATH: /data/hwu/slg_data/CSL-Daily/mean.pt
    STD_PATH: /data/hwu/slg_data/CSL-Daily/std.pt
    MAX_MOTION_LEN: 400
    MIN_MOTION_LEN: 40
    MAX_TEXT_LEN: 40
    PICK_ONE_TEXT: true
    FRAME_RATE: 20.0
    UNIT_LEN: 4
    STD_TEXT: False
    USE_CLIP_FEAT: false

    # Audio configuration for speech-guided VQ learning
    AUDIO_DIR: /data/hwu/slg_data/How2Sign
    USE_SPEECH: true
    # PRECOMPUTED_SPEECH_DIR: /data/hwu/slg_data/How2Sign/speech_features/whisper-medium

METRIC:
  TYPE: ["MRMetrics"]

LOSS:
  LAMBDA_FEATURE: 1.0
  LAMBDA_VELOCITY: 0.0
  LAMBDA_COMMIT: 0.25
  LAMBDA_CLS: 1.0
  LAMBDA_LGVQ: 0.1  # Weight for speech-guided NCE loss
  ABLATION:
    RECONS_LOSS: "l1_smooth"

model:
  target: mGPT.models.mgpt.MotionGPT
  params:
    condition: "text"
    task: "t2m"
    lm: ${lm.default}
    motion_vae: ${vq.h2s_rvq_3_lgvq_whisper}
    hand_vae_cfg: null
    rhand_vae_cfg: null

LOGGER:
  TYPE: ["wandb"]
  VAL_EVERY_STEPS: 10
  WANDB:
    params:
      project: SLG
      name: ${NAME}
      tags: ['rvqvae', 'lgvq', 'whisper', 'speech_guided', 'how2sign']
