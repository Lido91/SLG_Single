NAME: MoMask_H2S_Stage3  # MoMask Stage 3: Residual Transformer for How2Sign
DEBUG: False
ACCELERATOR: 'gpu'
NUM_NODES: 1
DEVICE: [0,1,2]

TRAIN:
  STAGE: res_transformer  # Train Residual Transformer
  NUM_WORKERS: 8
  BATCH_SIZE: 64
  END_EPOCH: 500
  RESUME: ''
  PRETRAINED: ''
  # Path to pretrained RVQ-VAE checkpoint (Stage 1)
  PRETRAINED_VAE: experiments/mgpt/DETO_RVQ_wholebody/checkpoints/min-how2sign_MPJPE_PA_handepoch=439.ckpt
  # Path to pretrained MaskTransformer checkpoint (Stage 2) - optional for training
  PRETRAINED_MASK_TRANS: ''

  OPTIM:
    target: AdamW
    params:
      lr: 2e-4
      betas: [0.9, 0.99]
      weight_decay: 1e-5

  LR_SCHEDULER:
    target: CosineAnnealingLR
    params:
      T_max: ${TRAIN.END_EPOCH}
      eta_min: 1e-6

EVAL:
  BATCH_SIZE: 32
  SPLIT: val

TEST:
  CHECKPOINTS: ''
  SPLIT: test
  BATCH_SIZE: 32
  REPLICATION_TIMES: 1
  SAVE_PREDICTIONS: false

DATASET:
  target: mGPT.data.H2S.H2SDataModule
  CODE_PATH: '/data/hwu/slg_data/How2Sign/TOKENS_h2s_rvq_whole_6'
  TASK_PATH: ''
  H2S:
    DATASET_NAME: how2sign
    ROOT: ../SOKE/data/How2Sign
    CSL_ROOT: ../SOKE/data/CSL-Daily
    PHOENIX_ROOT: ../SOKE/data/Phoenix_2014T
    MEAN_PATH: ../SOKE/data/CSL-Daily/mean.pt
    STD_PATH: ../SOKE/data/CSL-Daily/std.pt
    MAX_MOTION_LEN: 400
    MIN_MOTION_LEN: 40
    MAX_TEXT_LEN: 40
    PICK_ONE_TEXT: true
    FRAME_RATE: 20.0
    UNIT_LEN: 4
    STD_TEXT: False

METRIC:
  TYPE: ['MRMetrics']

LOSS:
  LAMBDA_FEATURE: 1.0
  LAMBDA_VELOCITY: 0.0
  LAMBDA_COMMIT: 0.02
  LAMBDA_CLS: 1.0
  ABLATION:
    RECONS_LOSS: 'l1_smooth'

# MoMask model configuration
model:
  target: mGPT.models.mgpt_momask.MoMask
  params:
    condition: 'text'
    task: 't2m'
    stage: ${TRAIN.STAGE}
    codebook_size: 512
    num_quantizers: 6
    motion_vae: ${vq.h2s_rvq}
    mask_transformer: null  # Not trained in Stage 3
    res_transformer: ${res_transformer.default}

# ResidualTransformer configuration
res_transformer:
  default:
    target: mGPT.archs.residual_transformer.ResidualTransformer
    params:
      num_tokens: 512
      code_dim: 512
      latent_dim: 384
      ff_size: 1024
      num_layers: 8
      num_heads: 6
      dropout: 0.2
      cond_drop_prob: 0.2
      clip_dim: 512
      clip_version: 'ViT-B/32'
      num_quantizers: 6
      shared_codebook: false
      share_weight: true
      cond_mode: 'text'

LOGGER:
  TYPE: ['wandb']
  VAL_EVERY_STEPS: 5
  WANDB:
    params:
      project: SLG
      name: ${NAME}
      tags: ['momask', 'res_transformer', 'stage3', 'how2sign']
