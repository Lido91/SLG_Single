NAME: MaskedT2M_H2S  # Masked Transformer T2M for How2Sign
ACCELERATOR: "gpu"
NUM_NODES: 1
DEVICE: [0,1,2]

TRAIN:
  STAGE: lm_masked_t2m  # Masked Transformer T2M stage
  NUM_WORKERS: 16
  BATCH_SIZE: 32  # Can use larger batch for non-autoregressive generation
  END_EPOCH: 150
  RESUME: ""
  PRETRAINED:
  PRETRAINED_VAE: "experiments/mgpt/DETO_RVQ_wholebody_3/checkpoints/min-how2sign_MPJPE_PA_handepoch=489.ckpt"  # Pretrained RVQ-VAE (frozen)

  OPTIM:
    target: AdamW
    params:
      lr: 1e-4  # Learning rate for Masked Transformer
      betas: [0.9, 0.99]
      weight_decay: 0.01

  LR_SCHEDULER:
    target: CosineAnnealingLR
    params:
      T_max: ${TRAIN.END_EPOCH}
      eta_min: 1e-6

EVAL:
  BATCH_SIZE: 32
  SPLIT: val

TEST:
  CHECKPOINTS: "experiments/mgpt/MaskedT2M_H2S/checkpoints/min-how2sign_DTW_MPJPE_PA_lhandepoch=99.ckpt"
  SPLIT: test
  BATCH_SIZE: 16
  REPLICATION_TIMES: 1
  SAVE_PREDICTIONS: true
  MAX_SAMPLES: 500

DATASET:
  target: mGPT.data.H2S.H2SDataModule
  CODE_PATH: "TOKENS_h2s_rvq_whole_3"  # Motion tokens for training
  TASK_PATH: prepare/instructions/template_pretrain.json  # Only T2M task

  WORD_VERTILIZER_PATH: prepare/deps/glove
  H2S:
    DATASET_NAME: how2sign
    ROOT: /data/hwu/slg_data/How2Sign
    CSL_ROOT: /data/hwu/slg_data/CSL-Daily
    PHOENIX_ROOT: /data/hwu/slg_data/Phoenix_2014T
    MEAN_PATH: /data/hwu/slg_data/CSL-Daily/mean.pt
    STD_PATH: /data/hwu/slg_data/CSL-Daily/std.pt
    MAX_MOTION_LEN: 400
    MIN_MOTION_LEN: 40
    MAX_TEXT_LEN: 32  # Maximum text length for QFormer
    PICK_ONE_TEXT: true
    FRAME_RATE: 20.0
    UNIT_LEN: 4  # Temporal downsampling factor (400/4 = 100 tokens)
    STD_TEXT: False

METRIC:
  TYPE: ["TM2TMetrics"]  # Text-to-motion metrics for LM stage

LOSS:
  LAMBDA_MASKED_CE: 1.0  # Cross-entropy for masked token prediction

# Model configuration for Masked Transformer T2M
model:
  target: mGPT.models.mgpt.MotionGPT
  params:
    condition: "text"
    task: "t2m"
    lm: ${lm.masked_t2m}         # Masked Transformer architecture
    motion_vae: ${vq.h2s_rvq_3}  # Pretrained RVQ-VAE (frozen)
    hand_vae_cfg: null
    rhand_vae_cfg: null
    codebook_size: 512
    metrics_dict: ["TM2TMetrics"]

# Masked Transformer T2M reference
lm:
  masked_t2m:
    target: mGPT.archs.mgpt_masked_t2m.MaskedTransformerT2M
    params:
      num_tokens: 512                  # Codebook size
      code_dim: 512                    # Token embedding dimension
      latent_dim: 256                  # Transformer hidden dimension
      ff_size: 1024                    # Feedforward dimension
      num_layers: 8                    # Number of transformer layers
      num_heads: 4                     # Number of attention heads
      dropout: 0.1                     # Dropout rate
      cond_drop_prob: 0.1              # Classifier-free guidance dropout
      clip_dim: 512                    # CLIP output dimension
      clip_version: 'ViT-B/32'        # CLIP model version

# VQ reference (same as LaMP config)
vq:
  h2s_rvq_3:
    target: mGPT.archs.mgpt_rvq.RVQVae
    params:
      num_quantizers: 6  # Full 6-quantizer VAE
      quantizer: 'ema_reset'
      quantize_dropout_prob: 0.2
      quantize_dropout_cutoff_index: 0
      shared_codebook: false
      code_num: 512
      code_dim: 512
      output_emb_width: 512
      down_t: 2
      stride_t: 2
      width: 512
      depth: 3
      dilation_growth_rate: 3
      norm: None
      activation: 'relu'
      nfeats: 133  # How2Sign full body features

LOGGER:
  TYPE: ["wandb"]
  VAL_EVERY_STEPS: 10
  WANDB:
    params:
      project: SLG
      name: ${NAME}
      tags: ['masked_transformer', 'text2motion', 'how2sign', 'qformer']
      notes: |
        Masked Transformer for Text-to-Motion Generation.
        - Uses pretrained QFormer from LaMP for text encoding (frozen)
        - Iterative masked prediction with cosine scheduling
        - Classifier-free guidance (cond_scale=3)
        - Non-autoregressive generation (faster than GPT)
        - Uses first quantizer only (Q0) for coarse motion codes

        Generation Parameters:
        - timesteps: 18 (iterative refinement steps)
        - cond_scale: 3 (classifier-free guidance)
        - temperature: 1.0
        - top_k filtering: 0.9
