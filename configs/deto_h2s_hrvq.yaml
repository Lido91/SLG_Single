NAME: DETO_HRVQ_wholebody  # Hierarchical Residual VQ-VAE for How2Sign
ACCELERATOR: "gpu"
NUM_NODES: 1
DEVICE: [0,1,2]

TRAIN:
  STAGE: vae  # VAE training stage
  NUM_WORKERS: 8
  BATCH_SIZE: 48  # Adjust based on GPU memory
  END_EPOCH: 500
  RESUME: ""
  PRETRAINED: ""
  PRETRAINED_VAE: ""  # Set to checkpoint path if continuing training

  OPTIM:
    target: AdamW
    params:
      lr: 2e-4
      betas: [0.9, 0.99]
      weight_decay: 0.0

  LR_SCHEDULER:
    target: CosineAnnealingLR
    params:
      T_max: ${TRAIN.END_EPOCH}
      eta_min: 1e-6

EVAL:
  BATCH_SIZE: 16
  SPLIT: val

TEST:
  CHECKPOINTS: ""  # Will be set after training
  SPLIT: test
  BATCH_SIZE: 16
  REPLICATION_TIMES: 1
  SAVE_PREDICTIONS: False

DATASET:
  target: mGPT.data.H2S.H2SDataModule
  CODE_PATH: "TOKENS_h2s_hrvq_whole"  # Not used in VAE stage
  TASK_PATH: ""
  WORD_VERTILIZER_PATH: prepare/deps/glove
  H2S:
    DATASET_NAME: how2sign
    ROOT: /data/hwu/slg_data/How2Sign
    CSL_ROOT: /data/hwu/slg_data/CSL-Daily
    PHOENIX_ROOT: /data/hwu/slg_data/Phoenix_2014T
    MEAN_PATH: /data/hwu/slg_data/CSL-Daily/mean.pt
    STD_PATH: /data/hwu/slg_data/CSL-Daily/std.pt
    MAX_MOTION_LEN: 400
    MIN_MOTION_LEN: 40
    MAX_TEXT_LEN: 40
    PICK_ONE_TEXT: true
    FRAME_RATE: 20.0
    UNIT_LEN: 4
    STD_TEXT: False

METRIC:
  TYPE: ["MRMetrics"]  # Motion Reconstruction metrics for VAE stage

LOSS:
  LAMBDA_FEATURE: 1.0
  LAMBDA_VELOCITY: 0.0
  LAMBDA_COMMIT: 0.02  # Commitment loss weight
  LAMBDA_CLS: 1.0
  ABLATION:
    RECONS_LOSS: "l1_smooth"

# Model configuration for HR-VQVAE
model:
  target: mGPT.models.mgpt.MotionGPT
  params:
    condition: "text"
    task: "t2m"
    lm: ${lm.default}
    motion_vae: ${vq.h2s_hrvq}      # Use HR-VQVAE (hierarchical residual)
    hand_vae_cfg: null              # Not used - single VAE architecture
    rhand_vae_cfg: null             # Not used - single VAE architecture

LOGGER:
  TYPE: ["wandb"]
  VAL_EVERY_STEPS: 10
  WANDB:
    params:
      project: SLG
      name: ${NAME}
      tags: ['hrvqvae', 'hierarchical_residual', 'how2sign']
