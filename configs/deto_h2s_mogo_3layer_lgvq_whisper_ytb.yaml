NAME: DETO_Mogo_3layer_lgvq_whisper_ytb # Mogo-style Hierarchical RVQ-GPT with LGVQ for Youtube3D
ACCELERATOR: "gpu"
NUM_NODES: 1
DEVICE: [0,1]

TRAIN:
  STAGE: lm_pretrain  # Mogo-style Hierarchical RVQ-GPT stage
  NUM_WORKERS: 64
  BATCH_SIZE: 12
  END_EPOCH: 150
  RESUME: ""
  PRETRAINED:
  PRETRAINED_VAE: experiments/mgpt/DETO_RVQ_wholebody_3_lgvq_youtube/checkpoints/last.ckpt

  OPTIM:
    target: AdamW
    params:
      lr: 2e-4
      betas: [0.9, 0.99]
      weight_decay: 0.01

  LR_SCHEDULER:
    target: CosineAnnealingLR
    params:
      T_max: ${TRAIN.END_EPOCH}
      eta_min: 1e-6

EVAL:
  BATCH_SIZE: 12
  SPLIT: val

TEST:
  CHECKPOINTS: experiments/mgpt/${NAME}/checkpoints/last.ckpt
  SPLIT: test
  BATCH_SIZE: 12
  REPLICATION_TIMES: 1
  SAVE_PREDICTIONS: true
  MAX_SAMPLES: 500

DATASET:
  target: mGPT.data.H2S.H2SDataModule
  CODE_PATH: "TOKENS_h2s_rvq_whole_3_lgvq_whisper_Youtube3D"
  TASK_PATH: prepare/instructions/template_pretrain.json

  WORD_VERTILIZER_PATH: prepare/deps/glove
  H2S:
    DATASET_NAME: youtube3d
    ROOT: /data/hwu/slg_data/Youtube3D
    YOUTUBE3D_ROOT: /data/hwu/slg_data/Youtube3D
    CSL_ROOT: /data/hwu/slg_data/CSL-Daily
    PHOENIX_ROOT: /data/hwu/slg_data/Phoenix_2014T
    MEAN_PATH: /data/hwu/slg_data/Youtube3D/youtube3d_mean.pt
    STD_PATH: /data/hwu/slg_data/Youtube3D/youtube3d_std.pt
    MAX_MOTION_LEN: 400
    MIN_MOTION_LEN: 40
    MAX_TEXT_LEN: 40
    PICK_ONE_TEXT: true
    FRAME_RATE: 20.0
    UNIT_LEN: 4
    STD_TEXT: False
    GLOSS: ""
    BALANCED: False

    # Audio configuration
    AUDIO_DIR: /data/hwu/slg_data/Youtube3D
    USE_SPEECH: True
    PRELOAD_AUDIO: False

METRIC:
  TYPE: ["TM2TMetrics"]

LOSS:
  LAMBDA_CLS: 1.0

# Model configuration
model:
  target: mGPT.models.mgpt.MotionGPT
  params:
    condition: "audio"
    task: "a2m"
    lm: ${lm.mogo_speech}
    motion_vae: ${vq.h2s_rvq_3}
    hand_vae_cfg: null
    rhand_vae_cfg: null
    codebook_size: 512

# LM reference - Mogo-style architecture
lm:
  mogo_speech:
    target: mGPT.archs.mgpt_mogo.MogoHierarchicalGPT
    params:
      num_vq: 2048
      embed_dim: 1024
      block_size: 100
      num_quantizers: 3
      layers_per_level: [9, 6, 6]
      heads_per_level: [16, 16, 8]
      num_layers: 9
      n_head: 16
      dropout: 0.1
      text_encoder_type: null
      speech_encoder_type: whisper-medium
      use_speech: True
      cond_drop_prob: 0.1
      pkeep: 0.5
      corrupt_ratio: 0.0

# VQ reference
vq:
  h2s_rvq_3:
    target: mGPT.archs.mgpt_rvq.RVQVae
    params:
      num_quantizers: 3
      quantizer: 'ema_reset'
      quantize_dropout_prob: 0.2
      quantize_dropout_cutoff_index: 0
      shared_codebook: false
      code_num: 512
      code_dim: 512
      output_emb_width: 512
      down_t: 2
      stride_t: 2
      width: 512
      depth: 3
      dilation_growth_rate: 3
      norm: None
      activation: 'relu'
      nfeats: 133

LOGGER:
  TYPE: ["wandb"]
  VAL_EVERY_STEPS: 10
  WANDB:
    params:
      project: SLG
      name: ${NAME}
      tags: ['mogo', 'hierarchical', 'rvq', 'speech2motion', 'youtube3d', 'lgvq', 'whisper']
      notes: |
        Mogo-Style Speech-Driven Hierarchical RVQ-GPT with LGVQ VAE on Youtube3D
        - Architecture: Mogo (shared embedding, additive summation, quantizer-level embedding)
        - Speech Encoder: Whisper Medium (frozen)
        - VAE: LGVQ (Language-Guided VQ)
        - Dataset: Youtube3D
        - CFG: 10% condition dropout
        - Inter-level conditioning: Additive summation (Mogo-style, not cross-attention)
