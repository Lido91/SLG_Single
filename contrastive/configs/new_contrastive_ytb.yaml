# ============================================================================
# NEW CONTRASTIVE PIPELINE — Transformer Projection Heads
# Speech (HuBERT-Large) + Text (CLIP) + Motion (RVQVae) -> Shared 512-D Space
#
# Train:
#   python -m contrastive.train_new --config contrastive/configs/new_contrastive.yaml
# ============================================================================

# Data
data:
  dataset_name: how2sign
  root: /data/hwu/slg_data/How2Sign
  youtube3d_root: /data/hwu/slg_data/Youtube3D
  audio_dir: /data/hwu/slg_data/How2Sign
  mean_path: /data/hwu/slg_data/Youtube3D/youtube3d_mean.pt
  std_path: /data/hwu/slg_data/Youtube3D/youtube3d_std.pt
  max_motion_length: 400
  min_motion_length: 40
  unit_length: 4
  preload_features: True
  precomputed_feat_dir: /data/hwu/slg_data/How2Sign/precomputed_feats

# Model — frozen backbone encoders
model:
  speech_encoder_type: hubert-large   # -> 1024-D frame features
  text_encoder_type: clip             # -> 512-D CLS token
  temperature_init: 0.07
  enable_speech: True
  enable_text: True

# Projection Head — shared architecture for all 3 modalities
projection_head:
  proj_dim: 512
  num_layers: 4
  nhead: 8
  dim_feedforward: 2048
  dropout: 0.1
  max_seq_len: 1500

# VAE (frozen, pretrained) — motion backbone
vae:
  params:
    nfeats: 133
    num_quantizers: 3
    code_dim: 512
    code_num: 512
    output_emb_width: 512
    down_t: 2
    stride_t: 2
    width: 512
    depth: 3
    dilation_growth_rate: 3
  checkpoint: "experiments/mgpt/DETO_RVQ_wholebody_3_youtube/checkpoints/min-youtube3d_MPJPE_PA_handepoch=109.ckpt"

# Training
training:
  batch_size: 128
  max_epochs: 100
  lr: 1e-4
  weight_decay: 0.01
  num_workers: 16
  devices: [0]

# Logging
logger:
  project: Contrastive
  name: NewContrastive_TransformerProj_YTB
